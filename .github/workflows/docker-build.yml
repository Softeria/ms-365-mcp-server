name: Docker Build

on:
  push:
    branches: [main, fet/meeting_schedules]
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Ensure local Docker registry is running
        run: |
          if ! docker ps --filter "name=registry" --format '{{.Names}}' | grep -q '^registry$'; then
            echo "Starting local Docker registry..."
            docker run -d -p 5000:5000 --restart always --name registry registry:2
          else
            echo "Local registry already running."
          fi

      - name: Build Docker image
        run: docker build -t ms-365-mcp-server:latest .

      - name: Tag image for local registry
        run: docker tag ms-365-mcp-server:latest localhost:5000/ms-365-mcp-server:latest

      - name: Push image to local registry
        run: docker push localhost:5000/ms-365-mcp-server:latest
