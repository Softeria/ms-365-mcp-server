name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '34 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  security-events: write

env:
  NPM_CONFIG_REGISTRY: https://bts.artifactory.tio.systems/artifactory/api/npm/npm/
  NPM_CONFIG_REPLACE_REGISTRY_HOST: always
  NPM_CONFIG_LEGACY_PEER_DEPS: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL
    runs-on:
      group: elsevier-small-runners
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb

      - name: Analyze
        uses: github/codeql-action/analyze@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on:
      group: elsevier-small-runners
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48
        with:
          fail-on-severity: high
