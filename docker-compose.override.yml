# Local-development override to bypass Docker daemon restrictions on this host.
# /etc/docker/daemon.json sets `no-new-privileges: true` globally, which breaks
# the postgres-alpine entrypoint (gosu needs setuid to drop to the postgres
# user) and `icc: false`, which blocks default-bridge inter-container
# communication. This override is safe for local testing; production deploys
# should use examples/docker-compose/docker-compose.yml which uses explicit
# network isolation + non-root images that don't rely on gosu.

services:
  postgres:
    # Keep local override pgvector-capable; root compose already selects pgvector.
    image: pgvector/pgvector:pg16
    security_opt:
      - no-new-privileges=false

  redis:
    image: redis@sha256:7aec734b2bb298a1d769fd8729f13b8514a41bf90fcdd1f38ec52267fbaa8ee6
    security_opt:
      - no-new-privileges=false

  mcp:
    security_opt:
      - no-new-privileges=false
